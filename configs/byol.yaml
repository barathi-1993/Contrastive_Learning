# configs/byol.yaml
_base_: base.yaml

General:
  model_name: byol

Training:
  epochs: 300
  batch_size: 256
  optimizer: lars
  learning_rate: 0.2
  weight_decay: 1.5e-6
  warmup_epochs: 10
  scheduler: cosine

BYOL:
  projection_dim: 256
  projection_hidden_dim: 4096
  prediction_hidden_dim: 4096
  ema_decay: 0.996
  ema_decay_max: 1.0              # linearly annealed to this value
