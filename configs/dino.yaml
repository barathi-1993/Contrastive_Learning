# configs/dino.yaml
_base_: base.yaml

General:
  model_name: dino

Augmentation:
  # DINO uses 2 global crops + N local crops
  global_crop_scale: [0.4, 1.0]
  local_crop_scale:  [0.05, 0.4]
  n_local_crops: 8

Training:
  epochs: 300
  batch_size: 64
  optimizer: adamw
  learning_rate: 5.0e-4
  weight_decay: 0.04
  weight_decay_end: 0.4
  warmup_epochs: 10
  clip_grad_norm: 3.0

DINO:
  out_dim: 65536
  projection_hidden_dim: 2048
  bottleneck_dim: 256
  student_temp: 0.1
  teacher_temp: 0.04
  warmup_teacher_temp: 0.04
  warmup_teacher_temp_epochs: 30
  ema_decay: 0.996
  center_momentum: 0.9
  freeze_last_layer_epochs: 1
