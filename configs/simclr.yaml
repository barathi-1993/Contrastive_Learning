# configs/simclr.yaml
# Inherits all defaults from base.yaml — only overrides are listed here

_base_: base.yaml

General:
  model_name: simclr

Training:
  epochs: 200
  batch_size: 256
  optimizer: adamw
  learning_rate: 3.0e-4

SimCLR:
  projection_dim: 128
  projection_hidden_dim: 2048
  temperature: 0.5
  use_triplet_loss: true
  triplet_weight: 1.0
  triplet_margin: 1.0
